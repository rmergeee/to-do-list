version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: productivity_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: productivity_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: productivity_backend
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: secretpassword
      DB_NAME: productivity_db
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: productivity_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network
      - web_network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
  web_network:
    external: true
